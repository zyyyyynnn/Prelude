name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    # Pin Playwright's browser install path to the workspace cache dir so
    # the `actions/cache` step below can actually hit on subsequent runs.
    # The default location (C:\Users\<runner>\AppData\Local\ms-playwright)
    # is outside the runner's cacheable workspace.
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whitespace
        shell: pwsh
        run: |
          $event = "${{ github.event_name }}"
          if ($event -eq 'pull_request') {
            $baseSha = "${{ github.event.pull_request.base.sha }}"
            if ([string]::IsNullOrWhiteSpace($baseSha)) {
              git diff --check HEAD~1
            } else {
              git fetch origin "$baseSha" --depth=1
              git diff --check "$baseSha"...HEAD
            }
          } else {
            git diff --check HEAD~1
          }

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install sentrux (v0.5.7)
        shell: pwsh
        run: |
          $url = 'https://github.com/sentrux/sentrux/releases/download/v0.5.7/sentrux-windows-x86_64.exe'
          $expectedSha256 = '40dd2e47804bf9f006015eb742abfe178a824f42d4a19eb00478a7d705697cac'
          $destDir = Join-Path $env:RUNNER_TEMP 'sentrux'
          New-Item -ItemType Directory -Path $destDir -Force | Out-Null
          $exePath = Join-Path $destDir 'sentrux.exe'
          Invoke-WebRequest -Uri $url -OutFile $exePath -UseBasicParsing
          $actualSha256 = (Get-FileHash -Path $exePath -Algorithm SHA256).Hash.ToLower()
          if ($actualSha256 -ne $expectedSha256) {
            throw "sentrux sha256 mismatch: expected $expectedSha256, got $actualSha256"
          }
          Write-Host "sentrux sha256 verified: $actualSha256"
          # Make available to subsequent steps via GITHUB_PATH.
          $envDir = Join-Path $destDir 'bin'
          New-Item -ItemType Directory -Path $envDir -Force | Out-Null
          Copy-Item $exePath (Join-Path $envDir 'sentrux.exe')
          "$envDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Check architecture rules
        run: sentrux check .

      - name: Build backend
        working-directory: backend
        run: mvn -q -DskipTests compile

      - name: Check backend tests
        working-directory: backend
        run: mvn -q test

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/target/site/jacoco
          if-no-files-found: warn
          retention-days: 14

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit frontend production dependencies
        working-directory: frontend
        run: npm audit --omit=dev

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify UI guardrails (static token + raw px / shadow audit)
        working-directory: frontend
        run: npm run verify:ui

      - name: Verify token schema (categories / shadow rules / design-lock values)
        working-directory: frontend
        run: npm run verify:tokens

      - name: Verify BYOK settings flow
        working-directory: frontend
        run: npm run verify:byok

      - name: Verify dark theme flow
        working-directory: frontend
        run: npm run verify:dark

      # Playwright UI verification harness (visual regression + a11y).
      # Bundled with @playwright/test; uses the same node_modules cache from
      # `npm ci` above. Browsers are installed explicitly because the
      # windows-latest runner does NOT ship with chromium pre-installed.
      # We install BOTH the headed chromium browser and the headless-shell
      # variant because @playwright/test 1.59.x defaults to the headless
      # shell for `headless: true` (see
      # frontend/node_modules/playwright-core/browsers.json). Installing
      # only `chromium` leaves `chromium_headless_shell-<rev>/.../*.exe`
      # missing and the run fails with "Executable doesn't exist at ...".
      #
      # We pin PLAYWRIGHT_BROWSERS_PATH to the workspace cache dir so the
      # `actions/cache` step below can hit on subsequent runs — the
      # default path (C:\Users\<runner>\AppData\Local\ms-playwright) is
      # not in the runner's cacheable workspace. We also drop
      # `--with-deps`: it is a no-op on windows-latest and was previously
      # a small extra attack surface for transient download stalls. The
      # 15-minute timeout prevents a single bad download from holding the
      # whole job open indefinitely.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright chromium + headless shell browsers
        working-directory: frontend
        run: npx --no-install playwright install chromium chromium-headless-shell
        timeout-minutes: 15

      - name: Verify UI accessibility (axe + keyboard paths)
        working-directory: frontend
        # Phase 5 starts this as a blocking gate because @axe-core/playwright is
        # deterministic against the mocked /api/** routes. Promote visual
        # capture to blocking only after at least one release cycle of green
        # in main; see docs/quality/ui-visual-regression.md and ui-a11y.md.
        run: npm run verify:a11y

      - name: Capture UI visual baseline (artifact only)
        if: always()
        working-directory: frontend
        # Continue on error: visual baselines are noisy in CI. Artifacts are
        # uploaded for human review and Phase 6 follow-up; failures here
        # never block the PR.
        continue-on-error: true
        run: npm run capture:visual

      - name: Upload UI visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-visual-baseline
          path: |
            frontend/tests/visual/__screenshots__/
            output/screenshots/visual/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-artifacts
          path: frontend/test-results/
          if-no-files-found: ignore
          retention-days: 7
