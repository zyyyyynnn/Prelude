name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whitespace
        shell: pwsh
        run: |
          $event = "${{ github.event_name }}"
          if ($event -eq 'pull_request') {
            $baseSha = "${{ github.event.pull_request.base.sha }}"
            if ([string]::IsNullOrWhiteSpace($baseSha)) {
              git diff --check HEAD~1
            } else {
              git fetch origin "$baseSha" --depth=1
              git diff --check "$baseSha"...HEAD
            }
          } else {
            git diff --check HEAD~1
          }

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend
        working-directory: backend
        run: mvn -q -DskipTests compile

      - name: Check backend tests
        working-directory: backend
        run: mvn -q test

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify BYOK settings flow
        working-directory: frontend
        run: npm run verify:byok

      - name: Verify dark theme flow
        working-directory: frontend
        run: npm run verify:dark
