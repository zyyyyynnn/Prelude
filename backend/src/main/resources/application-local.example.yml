# dev mode 本地配置模板（仅开发调试，非默认入口）。
# 默认端口对齐 Docker Compose 暴露端口：先 docker compose up 中间件，再本机跑后端。
spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:13306/interview_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root_password   # 与 .env 中 MYSQL_ROOT_PASSWORD 保持一致
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 16379
      database: 0
      password: your_redis_password_if_any
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest

jwt:
  secret: replace-with-at-least-32-bytes-jwt-secret

app:
  crypto:
    aes-secret: replace-with-at-least-32-bytes-aes-secret

openai:
  base-url: ${OPENAI_BASE_URL:}
  model: ${OPENAI_MODEL:}
  api-key: ${OPENAI_API_KEY:}
