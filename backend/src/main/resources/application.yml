server:
  port: 8080

spring:
  application:
    name: backend
  config:
    import: optional:classpath:application-local.yml
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET:}
  expire-days: 7

deepseek:
  base-url: https://api.deepseek.com/chat/completions
  model: deepseek-v4-pro
  api-key: ${DEEPSEEK_API_KEY:}

openai:
  base-url: https://api.openai.com/v1/chat/completions
  model: gpt-5.5
  api-key: ${OPENAI_API_KEY:}

anthropic:
  base-url: https://api.anthropic.com/v1/messages
  model: claude-4.7-opus
  api-key: ${ANTHROPIC_API_KEY:}

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:5174
      - http://127.0.0.1:5174
  crypto:
    aes-secret: ${APP_CRYPTO_AES_SECRET:}
  sse-timeout-ms: 120000

logging:
  level:
    root: info
    com.interview: info
