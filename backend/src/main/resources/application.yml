server:
  port: 8080

spring:
  application:
    name: backend
  config:
    import: optional:classpath:application-local.yml
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET:}
  expire-days: 7

deepseek:
  base-url: https://api.deepseek.com/chat/completions
  model: deepseek-v4-pro
  api-key: ${DEEPSEEK_API_KEY:}

openai:
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1/chat/completions}
  model: ${OPENAI_MODEL:}
  api-key: ${OPENAI_API_KEY:}

anthropic:
  base-url: https://api.anthropic.com/v1/messages
  model: claude-4.7-opus
  api-key: ${ANTHROPIC_API_KEY:}

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
  crypto:
    aes-secret: ${APP_CRYPTO_AES_SECRET:}
  sse-timeout-ms: 120000

prelude:
  resume:
    projection-source: document
    backfill-on-startup: true
    backfill-batch-size: 100
  realtime:
    mode: local
  jobs:
    execution-lease-seconds: 300
    dispatch-recovery-delay-ms: 30000
    redispatch-after-seconds: 60
    report:
      max-attempts: 3
  retrieval:
    hybrid:
      vector-weight: 0.7
      keyword-weight: 0.3

logging:
  level:
    root: info
    com.interview: info

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health
  metrics:
    tags:
      application: ${spring.application.name}
