spring:
  datasource:
    url: jdbc:mysql://localhost:3306/interview_system?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

jwt:
  secret: local-dev-jwt-secret-0123456789abcdef

app:
  crypto:
    aes-secret: local-dev-aes-secret-0123456789abcdef

openai:
  api-key: ${MIMO_API_KEY}

anthropic:
  base-url: https://api.anthropic.com/v1/messages
  model: claude-4.7-opus
  api-key: ${ANTHROPIC_API_KEY:}

